<script>
    // --- CONFIGURATION ---
    // REMPLACE LE TEXTE ENTRE GUILLEMETS PAR TON URL /exec
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxZbzfkZI3rJrAclpute5932Melnxe0AlEbYle74dIXOPuXMpqd_wQNiXr-WWjdkUNlfA/exec"; 

    const captureBtn = document.getElementById('captureBtn');
    const cameraInput = document.getElementById('cameraInput');
    const status = document.getElementById('status');
    const loader = document.getElementById('loader');
    const preview = document.getElementById('preview');

    captureBtn.addEventListener('click', () => {
        cameraInput.click();
    });

    cameraInput.addEventListener('change', function() {
        const file = this.files[0];
        if (!file) return;

        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        status.innerText = "Envoi en cours vers le Drive... 🚀";
        loader.style.display = 'block';
        captureBtn.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function() {
            const base64Data = reader.result.split(',')[1];
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify({
                    base64: base64Data,
                    name: "photo_" + Date.now() + ".jpg"
                })
            })
            .then(() => {
                status.innerHTML = "✅ Photo bien reçue !<br>Elle est dans l'album.";
                loader.style.display = 'none';
                setTimeout(() => {
                    status.innerText = "";
                    preview.style.display = 'none';
                    captureBtn.style.display = 'inline-block';
                }, 4000);
            })
            .catch(err => {
                status.innerText = "❌ Erreur. Vérifie ta connexion.";
                loader.style.display = 'none';
                captureBtn.style.display = 'inline-block';
            });
        };
    });
</script>
